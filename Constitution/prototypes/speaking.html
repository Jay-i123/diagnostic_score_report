<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnostiq Speaking Assessment — Task Browser</title>
<style>
  :root {
    --teal: #0D7377;
    --teal-light: #E8F5F5;
    --teal-dark: #095456;
    --dark: #1A1A2E;
    --grey: #555555;
    --light-grey: #F5F5F5;
    --border: #E0E0E0;
    --correct: #2E7D32;
    --correct-bg: #E8F5E9;
    --info-bg: #FFF8E1;
    --mic-bg: #FCE4EC;
    --mic-accent: #C62828;
    --prompt-bg: #E3F2FD;
    --prompt-accent: #1565C0;
    --da-bg: #F3E5F5;
    --da-accent: #7B1FA2;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--light-grey);
    color: var(--dark);
    line-height: 1.6;
  }

  .header {
    background: var(--teal);
    color: white;
    padding: 24px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .header h1 { font-size: 22px; font-weight: 700; }
  .header .subtitle { font-size: 13px; opacity: 0.85; margin-top: 2px; }
  .header .badge {
    background: rgba(255,255,255,0.2);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
  }
  .fw-nav-link {
    background: rgba(255,255,255,0.2);
    padding: 8px 16px; border-radius: 6px;
    font-size: 13px; font-weight: 600;
    color: white; cursor: pointer; text-decoration: none;
    white-space: nowrap; transition: background 0.15s;
    margin-left: auto;
  }
  .fw-nav-link:hover { background: rgba(255,255,255,0.3); }

  .container { display: flex; min-height: calc(100vh - 80px); }

  .sidebar {
    width: 280px; min-width: 280px; background: white;
    border-right: 1px solid var(--border);
    overflow-y: auto; position: sticky; top: 80px; height: calc(100vh - 80px);
  }
  .sidebar-section { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .sidebar-section:last-child { border-bottom: none; }
  .stage-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--teal); padding: 8px 20px 4px;
  }
  .stage-label .stage-time { font-weight: 400; color: var(--grey); text-transform: none; letter-spacing: 0; }
  .nav-item {
    display: flex; align-items: center; padding: 10px 20px; cursor: pointer;
    font-size: 13px; color: var(--dark); transition: all 0.15s; gap: 10px;
    border-left: 3px solid transparent;
  }
  .nav-item:hover { background: var(--teal-light); }
  .nav-item.active { background: var(--teal-light); border-left-color: var(--teal); font-weight: 600; }
  .nav-item .task-code {
    background: var(--teal); color: white; font-size: 10px; font-weight: 700;
    padding: 2px 6px; border-radius: 4px; min-width: 28px; text-align: center;
  }

  .main { flex: 1; padding: 32px 40px; max-width: 900px; }

  .task-header { margin-bottom: 24px; }
  .task-header .task-type-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--teal); color: white; padding: 6px 14px;
    border-radius: 6px; font-size: 12px; font-weight: 700; margin-bottom: 12px;
  }
  .task-header h2 { font-size: 24px; font-weight: 700; color: var(--dark); margin-bottom: 4px; }
  .task-header .q-matrix {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 13px; color: var(--teal); margin-bottom: 8px;
  }
  .task-header .description { font-size: 14px; color: var(--grey); line-height: 1.5; }

  /* Q-MATRIX MINI DOTS */
  .q-mini { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .q-mini-label { font-size: 11px; font-weight: 700; color: var(--grey); text-transform: uppercase; letter-spacing: 0.5px; }
  .q-dots { display: flex; gap: 4px; }
  .q-dot { padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; }
  .q-dot.loaded { background: var(--teal); color: white; }
  .q-dot.unloaded { background: var(--border); color: var(--grey); }

  /* ACARA BADGES */
  .acara-badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 700; }
  .acara-badge.beginning { background: #E3F2FD; color: #1565C0; }
  .acara-badge.emerging { background: #FFF3E0; color: #E65100; }
  .acara-badge.developing { background: #F3E5F5; color: #7B1FA2; }
  .acara-badge.consolidating { background: #E8F5E9; color: #2E7D32; }

  /* ACARA PHASE CARDS */
  .acara-card { padding: 16px; border-radius: 8px; }
  .acara-card.beginning { background: #E3F2FD; }
  .acara-card.emerging { background: #FFF3E0; }
  .acara-card.developing { background: #F3E5F5; }
  .acara-card.consolidating { background: #E8F5E9; }
  .acara-card-phase { font-weight: 700; font-size: 15px; margin-bottom: 6px; }
  .acara-card.beginning .acara-card-phase { color: #1565C0; }
  .acara-card.emerging .acara-card-phase { color: #E65100; }
  .acara-card.developing .acara-card-phase { color: #7B1FA2; }
  .acara-card.consolidating .acara-card-phase { color: #2E7D32; }
  .acara-card-desc { font-size: 13px; line-height: 1.6; }

  .item-card {
    background: white; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    margin-bottom: 24px; overflow: hidden; border: 1px solid var(--border);
  }
  .item-card .item-label {
    background: var(--light-grey); padding: 10px 20px; font-size: 12px;
    font-weight: 700; color: var(--grey); text-transform: uppercase;
    letter-spacing: 0.5px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .card-body { padding: 20px; }

  /* PICTURE STIMULUS */
  .picture-stimulus {
    background: #E8EAF6; border-radius: 8px; padding: 24px;
    text-align: center; margin-bottom: 12px;
  }
  .picture-icon { font-size: 64px; display: block; margin-bottom: 8px; }
  .picture-word { font-size: 22px; font-weight: 700; color: var(--dark); margin-top: 8px; }
  .picture-desc { font-size: 12px; color: var(--grey); font-style: italic; }

  /* PROMPT BOX */
  .prompt-box {
    background: var(--prompt-bg); border: 1px solid #BBDEFB;
    border-radius: 8px; padding: 16px 20px; margin-bottom: 16px;
  }
  .prompt-box .prompt-label {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.6px; color: var(--prompt-accent); margin-bottom: 10px;
  }
  .prompt-box .prompt-label .icon { font-size: 16px; }
  .prompt-box .prompt-text { font-size: 15px; line-height: 1.7; }
  .prompt-box .prompt-instruction {
    margin-top: 12px; font-size: 14px; font-weight: 600;
    color: var(--prompt-accent);
  }
  .prompt-box .prompt-meta {
    margin-top: 10px; font-size: 11px; color: var(--grey); font-style: italic;
  }

  /* AUDIO BOX */
  .audio-box {
    background: #EDE7F6; border: 1px solid #D1C4E9;
    border-radius: 8px; padding: 16px 20px; margin-bottom: 16px;
  }
  .audio-box .audio-label {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.6px; color: #5E35B1; margin-bottom: 10px;
  }
  .audio-box .audio-text { font-size: 14px; line-height: 1.7; }

  /* MIC BOX */
  .mic-box {
    background: var(--mic-bg); border: 1px solid #F8BBD0;
    border-radius: 8px; padding: 16px 20px; margin-bottom: 16px;
  }
  .mic-box .mic-label {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.6px; color: var(--mic-accent); margin-bottom: 10px;
  }
  .mic-box .mic-text { font-size: 14px; line-height: 1.6; }
  .mic-box .timer {
    display: inline-flex; align-items: center; gap: 6px;
    background: white; padding: 4px 12px; border-radius: 20px;
    font-size: 13px; font-weight: 600; color: var(--mic-accent); margin-top: 10px;
  }
  .mic-box .timer .dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--mic-accent);
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

  /* SCORING BOX */
  .scoring-box {
    background: var(--correct-bg); border: 1px solid #C8E6C9;
    border-radius: 8px; padding: 16px 20px; margin-bottom: 16px;
  }
  .scoring-box .scoring-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.6px; color: var(--correct); margin-bottom: 10px;
  }
  .scoring-box .scoring-text { font-size: 13px; line-height: 1.6; }
  .scoring-box .scoring-criteria {
    margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px;
  }
  .scoring-box .criteria-tag {
    background: white; border: 1px solid #A5D6A7; padding: 4px 10px;
    border-radius: 6px; font-size: 12px; font-weight: 600; color: var(--correct);
  }

  /* DA BOX */
  .da-box {
    background: var(--da-bg); border: 1px solid #CE93D8;
    border-radius: 8px; padding: 16px 20px; margin-bottom: 16px;
  }
  .da-box .da-label {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.6px; color: var(--da-accent); margin-bottom: 10px;
  }
  .da-box .da-tier {
    margin: 8px 0; padding: 10px 14px; background: white;
    border-radius: 6px; border-left: 3px solid var(--da-accent);
  }
  .da-box .da-tier .tier-num { font-weight: 700; color: var(--da-accent); font-size: 12px; }
  .da-box .da-tier .tier-text { font-size: 13px; margin-top: 4px; }

  /* EXPLANATION */
  .explanation {
    padding: 16px; background: var(--info-bg);
    border-radius: 8px; font-size: 13px; line-height: 1.6; color: var(--dark);
  }
  .explanation .exp-label {
    font-weight: 700; color: #F57F17; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
  }

  /* EXIT POINT BANNER */
  .exit-banner {
    background: #FFF3E0; border: 2px solid #FFB74D; border-radius: 8px;
    padding: 12px 20px; margin-bottom: 16px; font-size: 13px;
    display: flex; align-items: center; gap: 10px;
  }
  .exit-banner .exit-icon { font-size: 20px; }
  .exit-banner .exit-text { font-weight: 600; color: #E65100; }
  .exit-banner .exit-detail { color: var(--grey); font-size: 12px; }

  /* SAMPLE WORDS */
  .sample-words { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
  .sample-word {
    background: white; border: 1px solid var(--border); padding: 6px 14px;
    border-radius: 6px; font-size: 15px; font-weight: 500;
  }
  .sample-word.target { border-color: var(--teal); background: var(--teal-light); font-weight: 700; }

  /* CHAT BOX — for roleplay task */
  .chat-box {
    background: #F8F9FA; border: 1px solid var(--border);
    border-radius: 8px; padding: 16px 20px; margin-bottom: 16px;
  }
  .chat-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.6px; color: var(--teal); margin-bottom: 14px;
  }
  .chat-turn { margin-bottom: 14px; }
  .chat-speaker { font-size: 11px; font-weight: 700; color: var(--grey); margin-bottom: 4px; }
  .chat-bubble {
    display: inline-block; padding: 10px 14px; border-radius: 12px;
    font-size: 14px; line-height: 1.5; max-width: 85%;
  }
  .chat-bubble.incoming { background: #E8EAF6; color: var(--dark); border-bottom-left-radius: 4px; }
  .chat-bubble.outgoing { background: var(--teal-light); color: var(--dark); border-bottom-right-radius: 4px; }
  .student-turn { text-align: right; }
  .student-turn .chat-speaker { text-align: right; }
  .chat-note {
    font-size: 11px; color: var(--grey); font-style: italic;
    margin-top: 4px; padding: 0 4px;
  }
  .student-turn .chat-note { text-align: right; }

  .nav-btn {
    display: inline-block; padding: 10px 20px;
    background: var(--teal); color: white; border: none; border-radius: 8px;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.15s;
  }
  .nav-btn:hover { background: var(--teal-dark); }
  .nav-btn.secondary { background: #555; }

  @media (max-width: 900px) {
    .sidebar { display: none; }
    .main { padding: 20px; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Diagnostiq Speaking Assessment</h1>
    <div class="subtitle">Task Browser &mdash; CDSA v5.0</div>
  </div>
  <a class="fw-nav-link" onclick="showFramework()">&#129513; Framework Map</a>
  <div class="badge">Years 3&ndash;10</div>
</div>

<div class="container">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="main"></div>
</div>

<script>
const ATTR_NAMES = [
  'Segmental Accuracy',
  'Prosodic Control',
  'Spoken Lexicogrammar',
  'Fluency',
  'Pragmatic Competence'
];

const PROFILES = [
  { label: 'Profile 1', pattern: [0,0,0,0,0], desc: 'No attributes mastered', phase: 'Beginning' },
  { label: 'Profile 2', pattern: [1,0,0,0,0], desc: 'Segmental accuracy only', phase: 'Beginning\u2013Emerging' },
  { label: 'Profile 3', pattern: [1,1,0,0,0], desc: 'Adds prosodic control', phase: 'Emerging' },
  { label: 'Profile 4', pattern: [1,1,1,0,0], desc: 'Adds spoken lexicogrammar', phase: 'Emerging\u2013Developing' },
  { label: 'Profile 5', pattern: [1,1,1,1,0], desc: 'Adds fluency', phase: 'Developing' },
  { label: 'Profile 6', pattern: [1,1,1,1,1], desc: 'All attributes mastered', phase: 'Consolidating' },
];

const TASKS = [
  // ===== STAGE 1 =====
  {
    stage: 1,
    taskCode: "1",
    taskName: "Picture Naming",
    attributes: "A1: Segmental Accuracy",
    qMatrix: "[1,0,0,0,0]",
    description: "26 picture-and-word items covering complete phoneme coverage: 22 consonants, 11 vowels, 5 diphthongs, 8 consonant clusters, and multisyllabic structure. Student sees a picture and word label and says the word aloud. Three reportable sub-skills: Consonants, Vowels, Consonant clusters. Automatic L1 transfer pattern detection.",
    timing: "~2 min (26 items)",
    exitAfter: { label: "Exit A", profile: "Profile 1: [0,0,0,0,0]", phase: "Beginning", time: "~2 min", desc: "Cannot produce English sounds intelligibly. Focus: phonological awareness, minimal pair drills, targeted sound production." },
    samples: [
      {
        label: "Sample 1: Consonant \u2014 /\u03B8/ (voiceless th)",
        prompt: {
          type: "picture",
          image: { icon: "\uD83E\uDDB7", desc: "tooth" },
          text: "tooth",
          instruction: "Say the word for this picture."
        },
        scoring: {
          method: "Deepgram ASR word match + phoneme confidence",
          binary: "Word recognised \u226575% confidence? Yes\u00A0=\u00A01, No\u00A0=\u00A00",
          criteria: ["Target word 'tooth' recognised", "/\u03B8/ produced (not /t/ or /s/)", "Final /\u03B8/ not deleted"]
        },
        explanation: "The /\u03B8/ phoneme is absent in most L1s. Students from Mandarin, Vietnamese, Arabic, and Southern European backgrounds typically substitute /t/, /s/, or /f/. Deepgram returns a confidence score per word plus an n-best list \u2014 if the second-best match is a substituted form (e.g. 'toot' or 'sooth'), the substitution type is flagged for L1 transfer analysis."
      },
      {
        label: "Sample 2: Vowel \u2014 /\u025B/ short e",
        prompt: {
          type: "picture",
          image: { icon: "\uD83D\uDECF\uFE0F", desc: "bed" },
          text: "bed",
          instruction: "Say the word for this picture."
        },
        scoring: {
          method: "Deepgram ASR word match + phoneme confidence",
          binary: "Word recognised? Yes\u00A0=\u00A01, No\u00A0=\u00A00",
          criteria: ["Target word 'bed' recognised", "/\u025B/ vowel produced correctly", "Not confused with 'bad' /\u00E6/ or 'bid' /\u026A/"]
        },
        explanation: "Short vowel contrasts (/\u00E6/-/\u025B/-/\u026A/) are a common substitution area for EAL/D learners whose L1 has fewer vowel phonemes. Picture naming removes the reading confound \u2014 the student knows the word from the image, so production errors are phonological, not lexical."
      },
      {
        label: "Sample 3: Consonant cluster \u2014 /spr/",
        prompt: {
          type: "picture",
          image: { icon: "\uD83C\uDF38", desc: "spring" },
          text: "spring",
          instruction: "Say the word for this picture."
        },
        scoring: {
          method: "Deepgram ASR word match + phoneme confidence",
          binary: "Word recognised with cluster intact? Yes\u00A0=\u00A01, No\u00A0=\u00A00",
          criteria: ["Initial /spr-/ cluster produced as unit", "No vowel insertion (e.g. 'su-pring')", "No cluster reduction ('pring' or 'bring')"]
        },
        explanation: "Three-consonant onsets are absent in most L1 phonotactic systems. L1 syllable structure transfer is the most common error: vowel insertion ('su-pring'), consonant deletion ('pring'), or partial cluster. Sub-skill report: Consonant clusters."
      },
      {
        label: "Sample 4: Multisyllabic \u2014 stress pattern",
        prompt: {
          type: "picture",
          image: { icon: "\uD83D\uDC0A", desc: "crocodile" },
          text: "crocodile",
          instruction: "Say the word for this picture."
        },
        scoring: {
          method: "Deepgram ASR + talknicer syllable stress",
          binary: "Word recognised with correct stress? Yes\u00A0=\u00A01, No\u00A0=\u00A00",
          criteria: ["All 3 syllables produced", "Stress on first syllable (CROco-dile)", "No vowel substitution in unstressed syllables"]
        },
        explanation: "Multisyllabic items catch students who produce consonants and vowels correctly in isolation but apply L1 stress patterns to English words (e.g. 'cro-CO-dile'). Consistent mis-stressing here predicts A2 difficulty \u2014 it bridges segmental accuracy and prosodic control."
      }
    ]
  },
  {
    stage: 1,
    taskCode: "2a",
    taskName: "Passage Read-Aloud",
    attributes: "A2: Prosodic Control \u2014 Stress",
    qMatrix: "[1,1,0,0,0]",
    description: "Student reads 2\u20133 short passages containing stress-shift homographs with tagged stress targets. Two passage sets: Set A (Years 3\u20136) and Set B (Years 7\u201310). Uses the talknicer syllable stress engine. \u226575% stress targets correct \u2192 2a passed. A2 requires BOTH 2a and 2b.",
    timing: "~3 min",
    exitAfter: null,
    samples: [
      {
        label: "Passage Set A \u2014 Years 3\u20136",
        prompt: {
          type: "read",
          text: 'The <strong>present</strong> the teacher gave was a <strong>record</strong> player. She said she wanted to <strong>record</strong> her favourite songs so she could <strong>present</strong> them to her class. The students thought it was a <strong>perfect</strong> idea.',
          instruction: "Read this passage aloud at a comfortable pace.",
          meta: "~35 words \u2022 Stress targets in bold (student sees plain text) \u2022 Homographs: present (n./v.), record (n./v.)"
        },
        scoring: {
          method: "Talknicer syllable stress engine \u2014 syllable duration ratio comparison",
          binary: "\u226575% stress targets correct? Yes\u00A0=\u00A01 (2a passed), No\u00A0=\u00A00",
          criteria: ["PREsent (noun) vs preSENT (verb) distinction", "REcord (noun) vs reCORD (verb) distinction", "Rhythm not word-by-word (some vowel reduction present)"]
        },
        explanation: "Stress-shift homographs are the cleanest test of lexical stress knowledge \u2014 same orthographic form, different stress pattern depending on grammatical role. A student who stresses both 'present' identically is applying a single stored form. Talknicer measures syllable duration ratios to detect stress placement without relying on pitch, which varies by L1."
      },
      {
        label: "Passage Set B \u2014 Years 7\u201310",
        prompt: {
          type: "read",
          text: 'The <strong>content</strong> of the report was excellent, but the group needed to <strong>content</strong> themselves with a lower mark because they went over time. The teacher said the <strong>contrast</strong> between their written work and their presentation was significant \u2014 they needed to <strong>contrast</strong> the two more clearly next time.',
          instruction: "Read this passage aloud at a comfortable pace.",
          meta: "~55 words \u2022 Stress targets in bold (student sees plain text) \u2022 Homographs: content (n./v.), contrast (n./v.)"
        },
        scoring: {
          method: "Talknicer syllable stress engine",
          binary: "\u226575% stress targets correct? Yes\u00A0=\u00A01 (2a passed), No\u00A0=\u00A00",
          criteria: ["CONtent (noun) vs conTENT (verb) distinction", "CONtrast (noun) vs conTRAST (verb) distinction", "Academic vocabulary stress patterns (report, significant, presentation)"]
        },
        explanation: "Years 7\u201310 items use academic register vocabulary that students encounter in classroom discourse. A student who reads academic text word-by-word with equal stress on every syllable cannot participate effectively in academic oral tasks \u2014 this is what ACARA's Developing prosodic descriptor targets."
      }
    ]
  },
  {
    stage: 1,
    taskCode: "2b",
    taskName: "Elicited Imitation",
    attributes: "A2: Prosodic Control \u2014 Connected Speech",
    qMatrix: "[1,1,0,0,0]",
    description: "Student hears a sentence spoken by a native speaker in natural connected form, then repeats it. No text displayed \u2014 audio only. Tests linking, elision, assimilation, and weak forms. Scored via PocketSphinx forced alignment: connected model vs citation model fit. \u226550% items connected \u2192 2b passed. A2 mastered = BOTH 2a AND 2b passed.",
    timing: "~2 min (6 items)",
    exitAfter: { label: "Exit B", profile: "Profile 2: [1,0,0,0,0]", phase: "Beginning\u2013Emerging", time: "~7 min", desc: "Sounds OK but English rhythm not yet acquired. Can place some stress but lacks connected speech features (linking, elision, weak forms). Focus: connected speech drills, shadowing exercises, prosodic awareness." },
    samples: [
      {
        label: "Item 1 (Years 3\u20136): Weak forms \u2014 'did you', 'to'",
        audio: '\u201CDid you go to sport today?\u201D',

// ===== UTILITIES =====
function parseQMatrix(str) { return JSON.parse(str); }

function getACARAPhase(qArr) {
  let highest = -1;
  qArr.forEach((v, i) => { if (v) highest = i; });
  if (highest <= 0) return { phase: 'Beginning', cls: 'beginning' };
  if (highest === 1) return { phase: 'Emerging', cls: 'emerging' };
  if (highest === 2) return { phase: 'Emerging\u2013Developing', cls: 'developing' };
  if (highest === 3) return { phase: 'Developing', cls: 'developing' };
  return { phase: 'Consolidating', cls: 'consolidating' };
}

function renderMiniMatrix(qStr) {
  const qArr = parseQMatrix(qStr);
  const phase = getACARAPhase(qArr);
  let html = '<div class="q-mini"><span class="q-mini-label">Q</span><div class="q-dots">';
  qArr.forEach((v, i) => {
    html += `<div class="q-dot ${v ? 'loaded' : 'unloaded'}" title="A${i+1}: ${ATTR_NAMES[i]}">A${i+1}</div>`;
  });
  html += `</div><span class="acara-badge ${phase.cls}">${phase.phase}</span></div>`;
  return html;
}

function renderSidebar() {
  let html = '';

    <div class="nav-item ${activeTaskIdx === -1 ? 'active' : ''}" onclick="showFramework()">
      <span style="font-size:16px">&#129513;</span>
      <span>Framework Map</span>
    </div>
  </div>`;

  const stages = [
    { num: 1, label: 'STAGE 1: Phonological Screening', time: '~7 min' },
    { num: 2, label: 'STAGE 2: Spontaneous Production', time: '~7 min' }
  ];
  stages.forEach(stage => {
    const tasks = TASKS.filter(t => t.stage === stage.num);
    html += `<div class="sidebar-section">
      <div class="stage-label">${stage.label} <span class="stage-time">${stage.time}</span></div>`;
    tasks.forEach(task => {

      </div>`;
    });

  });
  sidebar.innerHTML = html;

      </div>`;
    }

    // Explanation
    html += `<div class="explanation">
      <div class="exp-label">Diagnostic Notes</div>
      ${sample.explanation}
    </div>`;

    html += '</div></div>';
  });

  // Exit banner
  if (task.exitAfter) {
    html += `<div class="exit-banner">
      <span class="exit-icon">&#128680;</span>
      <div>
        <div class="exit-text">${task.exitAfter.label} &mdash; ${task.exitAfter.profile}</div>
        <div class="exit-detail">ACARA: ${task.exitAfter.phase} &bull; Duration: ${task.exitAfter.time}<br>${task.exitAfter.desc}</div>
      </div>
    </div>`;
  }

  // Navigation
  html += '<div style="display:flex;justify-content:space-between;margin-top:20px;">';
  if (idx > 0) html += `<button class="nav-btn secondary" onclick="selectTask(${idx-1})">&larr; ${TASKS[idx-1].taskName}</button>`;
  else html += '<div></div>';
  if (idx < TASKS.length - 1) html += `<button class="nav-btn" onclick="selectTask(${idx+1})">${TASKS[idx+1].taskName} &rarr;</button>`;
  html += '</div>';

  main.innerHTML = html;
  window.scrollTo(0, 0);
}

function showFramework() {
  activeTaskIdx = -1;
  renderSidebar();

  let html = `<div class="task-header">
    <div class="task-type-badge">Framework Reference</div>
    <h2>CDSA v5 &mdash; Diagnostic Framework</h2>
    <div class="description">Speaking attribute hierarchy, mastery profiles, task-attribute mapping, and ACARA phase alignment.</div>
  </div>`;

  // 1. Attribute hierarchy
  html += `<div class="item-card"><div class="item-label">Attribute Prerequisite Hierarchy</div>
  <div class="card-body">
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px">`;
  ATTR_NAMES.forEach((name, i) => {
    html += `<div style="background:var(--teal);color:white;padding:8px 14px;border-radius:6px;font-size:13px;font-weight:700">A${i+1}: ${name}</div>`;
    if (i < ATTR_NAMES.length - 1) html += `<div style="font-size:20px;color:var(--teal)">&rarr;</div>`;
  });
  html += `</div>
    <div style="font-size:13px;color:var(--grey)">Each attribute requires mastery of all lower attributes. Maps to ACARA EAL/D Learning Progression: Beginning &rarr; Emerging &rarr; Developing &rarr; Consolidating.</div>
  </div></div>`;

  // 2. Mastery profiles
  html += `<div class="item-card"><div class="item-label">Valid Mastery Profiles</div>
  <div class="card-body"><table style="width:100%;border-collapse:collapse;font-size:13px">
  <thead><tr style="background:var(--light-grey)">
    <th style="padding:8px 12px;text-align:left;border-bottom:2px solid var(--border)">Profile</th>`;
  ATTR_NAMES.forEach((n, i) => {
    html += `<th style="padding:8px;text-align:center;border-bottom:2px solid var(--border)">A${i+1}</th>`;
  });
  html += `<th style="padding:8px 12px;text-align:left;border-bottom:2px solid var(--border)">ACARA Phase</th>
    <th style="padding:8px 12px;text-align:left;border-bottom:2px solid var(--border)">Description</th>
  </tr></thead><tbody>`;
  PROFILES.forEach(p => {
    const cls = p.phase.toLowerCase().split('\u2013')[0].replace(/[^a-z]/g, '');
    html += `<tr style="border-bottom:1px solid var(--border)">
      <td style="padding:8px 12px;font-weight:700">${p.label}</td>`;
    p.pattern.forEach(v => {
      html += `<td style="padding:8px;text-align:center;font-size:16px">${v ? '<span style="color:var(--teal)">\u2713</span>' : '<span style="color:#ccc">\u2717</span>'}</td>`;
    });
    html += `<td style="padding:8px 12px"><span class="acara-badge ${cls}">${p.phase}</span></td>
      <td style="padding:8px 12px;color:var(--grey)">${p.desc}</td>
    </tr>`;
  });
  html += `</tbody></table></div></div>`;

  // 3. Task type → attribute mapping
  html += `<div class="item-card"><div class="item-label">Task Type &rarr; Attribute Mapping</div>
  <div class="card-body"><table style="width:100%;border-collapse:collapse;font-size:13px">
  <thead><tr style="background:var(--light-grey)">
    <th style="padding:8px 12px;text-align:left;border-bottom:2px solid var(--border)">Task</th>
    <th style="padding:8px 12px;text-align:left;border-bottom:2px solid var(--border)">Name</th>`;
  ATTR_NAMES.forEach((n, i) => {
    html += `<th style="padding:8px;text-align:center;border-bottom:2px solid var(--border)" title="${n}">A${i+1}</th>`;
  });
  html += `<th style="padding:8px 12px;text-align:center;border-bottom:2px solid var(--border)">Time</th></tr></thead><tbody>`;
  TASKS.forEach((t, idx) => {
    const qArr = parseQMatrix(t.qMatrix);
    html += `<tr style="border-bottom:1px solid var(--border);cursor:pointer" onclick="selectTask(${idx})">
      <td style="padding:8px 12px"><span style="background:var(--teal);color:white;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px">${t.taskCode}</span></td>
      <td style="padding:8px 12px">${t.taskName}</td>`;
    qArr.forEach(v => {
      html += `<td style="padding:8px;text-align:center">${v ? '<span style="color:var(--teal);font-size:16px">&#9679;</span>' : '<span style="color:#ddd;font-size:16px">&#9675;</span>'}</td>`;
    });
    html += `<td style="padding:8px 12px;text-align:center;color:var(--grey)">${t.timing}</td></tr>`;
  });
  html += `</tbody></table></div></div>`;

  // 4. ACARA phase cards
  const phases = [
    { phase: 'Beginning', cls: 'beginning', desc: 'Segmental accuracy. Can produce intelligible English phonemes but rhythm and connected speech not yet acquired.' },
    { phase: 'Emerging', cls: 'emerging', desc: 'Prosodic control + spoken lexicogrammar. Can produce English stress and connected speech, and assemble spontaneous clausal speech.' },
    { phase: 'Developing', cls: 'developing', desc: 'Fluency. Can produce speech at functional rate with adequate continuity across monologic and dialogic contexts.' },
    { phase: 'Consolidating', cls: 'consolidating', desc: 'Pragmatic competence. Can produce appropriate speech acts with register awareness and politeness strategies.' }
  ];
  html += `<div class="item-card"><div class="item-label">ACARA Phase Descriptions</div>
  <div class="card-body" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">`;
  phases.forEach(p => {
    html += `<div class="acara-card ${p.cls}">
      <div class="acara-card-phase">${p.phase}</div>
      <div class="acara-card-desc">${p.desc}</div>
    </div>`;
  });
  html += `</div></div>`;

  html += `<div style="margin-top:20px">
    <button class="nav-btn" onclick="selectTask(0)">Task 1: Picture Naming &rarr;</button>
  </div>`;

  main.innerHTML = html;
  window.scrollTo(0, 0);
}

function selectTask(idx) { renderTask(idx); }
renderTask(0);
</script>
</body>
</html>
